<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmbedCast - Control Center</title>
    <style>
        :root {
            --bg-dark: #1e1e28;
            --bg-card: #2d2d3a;
            --bg-elevated: #3d3d4a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b0;
            --accent-mint: #5eead4;
            --accent-mint-dim: rgba(94, 234, 212, 0.3);
            --grey-block: #6b6b7b;
            --grey-light: #8a8a9a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--bg-elevated);
        }

        .logo {
            width: 50px;
            height: 50px;
            background: var(--bg-elevated);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo-e {
            font-size: 28px;
            font-weight: bold;
            color: var(--grey-light);
        }

        .logo-accent {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent-mint);
            border-radius: 2px;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 8px var(--accent-mint);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-mint); }
            50% { opacity: 0.6; box-shadow: 0 0 4px var(--accent-mint-dim); }
        }

        .title {
            flex: 1;
        }

        .title h2 {
            color: var(--text-primary);
            font-weight: 300;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
        }

        .title h2 span {
            color: var(--accent-mint);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .online {
            background: rgba(94, 234, 212, 0.2);
            color: var(--accent-mint);
            border: 1px solid var(--accent-mint);
        }

        .offline {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .section {
            margin-bottom: 25px;
        }

        .section label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 5px 0;
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--grey-block);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-mint);
        }

        input::placeholder {
            color: var(--grey-block);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 14px 20px;
            background: var(--accent-mint);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #4dd8c2;
            transform: translateY(-1px);
        }

        button.secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--grey-block);
        }

        button.secondary:hover {
            border-color: var(--accent-mint);
            color: var(--accent-mint);
        }

        .player-hud {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid var(--bg-elevated);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .time-info #qualities {
            color: var(--grey-block);
        }

        .progress-container {
            width: 100%;
            background: var(--bg-elevated);
            height: 6px;
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        #progressBar {
            background: var(--accent-mint);
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-mint-dim);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .controls button {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--grey-block);
            font-size: 13px;
        }

        .controls button:hover {
            border-color: var(--accent-mint);
            color: var(--accent-mint);
        }

        .controls button.primary {
            background: var(--accent-mint);
            color: var(--bg-dark);
            border: none;
        }

        .controls button.stop {
            border-color: #ef4444;
            color: #ef4444;
        }

        .controls button.stop:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        #log {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-dark);
            height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            border-radius: 8px;
            border: 1px solid var(--bg-elevated);
        }

        #log div {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .success { color: var(--accent-mint); }
        .error { color: #ef4444; }
        .info { color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="logo-e">E</span>
                <div class="logo-accent"></div>
            </div>
            <div class="title">
                <h2>EMBED<span>CAST</span></h2>
            </div>
            <span id="statusBadge" class="status-badge offline">Disconnected</span>
        </div>

        <div class="section">
            <label>TV Connection</label>
            <div class="btn-row">
                <input type="text" id="tvIp" placeholder="e.g. 10.42.0.224" style="flex: 2;">
                <button type="button" onclick="connect()" style="flex: 1;">Connect</button>
            </div>
        </div>

        <div class="section">
            <label>Video Stream URL</label>
            <input type="text" id="videoUrl" placeholder="Paste embed URL here...">
            <div class="btn-row">
                <button type="button" onclick="loadVideo()" style="flex: 3;">Cast to TV</button>
                <button type="button" onclick="sendAction('reload')" class="secondary" style="flex: 1;">Force Reload</button>
            </div>
        </div>

        <div class="player-hud">
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="qualities">No qualities detected</span>
                <span id="duration">00:00</span>
            </div>
            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
            <div class="controls">
                <button type="button" onclick="sendAction('seek', {seconds: -10})">-10s</button>
                <button type="button" id="playPauseBtn" onclick="togglePlay()" class="primary">Play</button>
                <button type="button" onclick="sendAction('seek', {seconds: 10})">+10s</button>
                <button type="button" onclick="sendAction('stop')" class="stop">Stop</button>
            </div>
        </div>

        <div id="log"></div>
    </div>

    <script>
        let ws = null;
        let isPaused = true;

        function log(msg, type = 'info') {
            const el = document.getElementById('log');
            if (!el) return;
            el.innerHTML += `<div class="${type}">${new Date().toLocaleTimeString()} - ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function loadSavedValues() {
            const savedIp = localStorage.getItem('lastIP');
            const savedUrl = localStorage.getItem('lastURL');
            if (savedIp) document.getElementById('tvIp').value = savedIp;
            if (savedUrl) document.getElementById('videoUrl').value = savedUrl;
        }

        function saveIP() {
            const ip = document.getElementById('tvIp').value.trim();
            if (ip) localStorage.setItem('lastIP', ip);
        }

        function saveURL() {
            const url = document.getElementById('videoUrl').value.trim();
            if (url) localStorage.setItem('lastURL', url);
        }

        function initWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + "//" + location.host + "/ws";
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log("Host Server Connected", "success");
                document.getElementById('statusBadge').className = 'status-badge online';
                document.getElementById('statusBadge').innerText = 'Online';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'status') {
                        updateUI(data);
                    } else if (data.type === 'log') {
                        log(`[TV] ${data.message}`, 'info');
                    }
                } catch(e) {}
            };

            ws.onclose = () => {
                log("Host Server Disconnected", "error");
                document.getElementById('statusBadge').className = 'status-badge offline';
                document.getElementById('statusBadge').innerText = 'Offline';
                setTimeout(initWebSocket, 2000);
            };
        }

        async function connect() {
            const ip = document.getElementById('tvIp').value;
            saveIP();
            const res = await fetch('/api/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip })
            });
            if (res.ok) log(`TV Connected: ${ip}`, "success");
            else log("Connection failed", "error");
        }

        function updateUI(data) {
            const percent = (data.duration > 0) ? (data.currentTime / data.duration) * 100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('currentTime').innerText = formatTime(data.currentTime);
            document.getElementById('duration').innerText = formatTime(data.duration);

            isPaused = data.paused;
            document.getElementById('playPauseBtn').innerText = isPaused ? 'Play' : 'Pause';
        }

        function formatTime(sec) {
            const s = Math.floor(sec);
            const m = Math.floor(s / 60);
            const secs = s % 60;
            return `${m.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function loadVideo() {
            const url = document.getElementById('videoUrl').value;
            saveURL();
            if (!url) return log("Please enter a URL", "error");
            sendAction('load', { url });
        }

        function togglePlay() {
            sendAction(isPaused ? 'play' : 'pause');
        }

        function sendAction(action, extra = {}) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action, ...extra }));
            }
        }

        loadSavedValues();
        initWebSocket();
    </script>
</body>
</html>
