name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'embedCast-tv/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'embedCast-tv/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x embedCast-tv/gradlew

      - name: Build Debug APK
        working-directory: embedCast-tv
        run: ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: embedCast-tv
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-debug-apk
          path: embedCast-tv/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-release-apk
          path: embedCast-tv/app/build/outputs/apk/release/*.apk
          retention-days: 30
