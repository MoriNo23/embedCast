name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'embedCast-tv/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'embedCast-tv/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: '34'
          sdk-tools: '34'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check gradlew exists
        working-directory: embedCast-tv
        run: |
          ls -la gradlew
          file gradlew

      - name: Grant execute permission for gradlew
        working-directory: embedCast-tv
        run: |
          chmod +x gradlew
          ls -la gradlew

      - name: Build Debug APK
        working-directory: embedCast-tv
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > embedCast-tv/app/release.keystore

      - name: Build Release APK
        working-directory: embedCast-tv
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export KEYSTORE_PATH="$KEYSTORE_PATH"
          export KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"
          export KEY_ALIAS="$KEY_ALIAS"
          export KEY_PASSWORD="$KEY_PASSWORD"
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-debug-apk
          path: embedCast-tv/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-release-apk
          path: embedCast-tv/app/build/outputs/apk/release/*.apk
          retention-days: 30
