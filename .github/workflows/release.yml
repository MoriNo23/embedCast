name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: '34'
          sdk-tools: '34'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: embedCast-tv
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: embedCast-tv
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-apk
          path: embedCast-tv/app/build/outputs/apk/release/*.apk

  build-host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build CLI tool
        working-directory: embedCast-host/cli-tool
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish --configuration Release --no-build --output ./publish

      - name: Build Web GUI
        working-directory: embedCast-host/web-gui
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish --configuration Release --no-build --output ./publish

      - name: Upload host tools
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-host-tools
          path: |
            embedCast-host/cli-tool/publish/
            embedCast-host/web-gui/publish/

  create-release:
    needs: [build-android, build-host]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: embedCast-apk
          path: ./artifacts/apk

      - name: Download host tools
        uses: actions/download-artifact@v4
        with:
          name: embedCast-host-tools
          path: ./artifacts/host-tools

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EmbedCast ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## 🎬 EmbedCast ${{ github.ref_name }}

            <p align="center">
              <img src="https://raw.githubusercontent.com/MoriNo23/embedCast/main/assets/logo.png" alt="EmbedCast Logo" width="120">
            </p>

            ### 📦 What's Included

            | File | Description |
            |------|-------------|
            | `*.apk` | Android TV Application |
            | `cli-tool/` | Linux Command-Line Tool |
            | `web-gui/` | Web-Based Control Panel |

            ### 🚀 Installation

            **Android TV:**
            1. Download the APK file
            2. Transfer to your Android TV device
            3. Install using a file manager

            **Linux Host:**
            1. Download the CLI tool or Web GUI
            2. Extract the archive
            3. Run the executable

            ### ✨ Features

            - 🎥 Video casting from Linux to Android TV
            - 🎮 Remote control via WebSocket
            - 📺 Android TV optimized with Leanback
            - 🔄 Auto-reconnect on disconnect
            - 💾 Resume playback from saved positions

            ### 📡 Quick Start

            ```bash
            # Start WebSocket server on Android TV
            # (Automatically starts on port 8080)

            # Send commands from Linux host
            ./cli-tool load "https://example.com/video.mp4"
            ./cli-tool play
            ./cli-tool pause
            ```

            ### 🔗 Links

            - [Documentation](https://github.com/MoriNo23/embedCast#readme)
            - [Report Issues](https://github.com/MoriNo23/embedCast/issues)
            - [WebSocket Protocol](https://github.com/MoriNo23/embedCast/blob/main/embedCast-tv/WEBSOCKET_PROTOCOL.md)

            ---
            ⭐ **Star this repo if you find it useful!**
          files: |
            ./artifacts/apk/*.apk
            ./artifacts/host-tools/**/*
