name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: '34'
          sdk-tools: '34'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: embedCast-tv
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: embedCast-tv
        run: ./gradlew assembleRelease --no-daemon

      - name: Create APK package
        run: |
          cd embedCast-tv/app/build/outputs/apk/release
          ls -la
          cp *.apk ../../../../
          cd ../../../..
          mv *.apk "EmbedCast-${{ github.ref_name }}-android-tv.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-apk
          path: EmbedCast-*.apk

  build-host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build CLI tool
        working-directory: embedCast-host/cli-tool
        run: |
          dotnet restore
          dotnet publish --configuration Release --output ./publish

      - name: Build Web GUI
        working-directory: embedCast-host/web-gui
        run: |
          dotnet restore
          dotnet publish --configuration Release --output ./publish

      - name: Create CLI package
        run: |
          cd embedCast-host/cli-tool/publish
          zip -r "../../../../EmbedCast-${{ github.ref_name }}-cli-tool.zip" .
          cd ../../../..

      - name: Create Web GUI package
        run: |
          cd embedCast-host/web-gui/publish
          zip -r "../../../../EmbedCast-${{ github.ref_name }}-web-gui.zip" .
          cd ../../../..

      - name: Upload host tools artifacts
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-host-tools
          path: EmbedCast-*.zip

  create-release:
    needs: [build-android, build-host]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "=== Artifacts ==="
          find ./artifacts -type f -name "*.apk" -o -type f -name "*.zip" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EmbedCast ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            <p align="center">
              <img src="https://raw.githubusercontent.com/MoriNo23/embedCast/main/assets/logo.png" alt="EmbedCast Logo" width="150">
            </p>

            # 🎬 EmbedCast ${{ github.ref_name }}

            **Android TV application for video casting with remote control via WebSocket**

            ---

            ## 📦 Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | Android TV | `EmbedCast-${{ github.ref_name }}-android-tv.apk` | Install on your Android TV device |
            | Linux CLI | `EmbedCast-${{ github.ref_name }}-cli-tool.zip` | Command-line interface |
            | Linux Web GUI | `EmbedCast-${{ github.ref_name }}-web-gui.zip` | Browser-based control panel |

            ---

            ## 🚀 Quick Start

            ### Android TV
            1. Download the APK
            2. Transfer to your Android TV
            3. Install and launch

            ### Linux Host
            ```bash
            # Extract CLI tool
            unzip EmbedCast-${{ github.ref_name }}-cli-tool.zip
            cd cli-tool
            ./cli-tool --help

            # Or use Web GUI
            unzip EmbedCast-${{ github.ref_name }}-web-gui.zip
            cd web-gui
            ./web-gui
            ```

            ---

            ## ✨ Features

            - 🎥 Cast videos from Linux to Android TV
            - 🎮 Full playback control via WebSocket
            - 📺 Leanback-optimized interface
            - 🔄 Auto-reconnect on disconnect
            - 💾 Resume playback from saved positions
            - 📡 Real-time status synchronization

            ---

            ## 📡 WebSocket Protocol

            ```bash
            # Connect to Android TV (default port 8080)
            ws://TV_IP:8080

            # Commands
            {"action": "load", "url": "https://example.com/video.mp4"}
            {"action": "play"}
            {"action": "pause"}
            {"action": "seek", "seconds": 120}
            {"action": "stop"}
            ```

            ---

            ## 🔗 Links

            - [📖 Documentation](https://github.com/MoriNo23/embedCast#readme)
            - [🐛 Report Issues](https://github.com/MoriNo23/embedCast/issues)
            - [📡 WebSocket Protocol](https://github.com/MoriNo23/embedCast/blob/main/embedCast-tv/WEBSOCKET_PROTOCOL.md)
            - [📜 Changelog](https://github.com/MoriNo23/embedCast/blob/main/CHANGELOG.md)

            ---

            ⭐ **Star this repo if you find it useful!**
          files: |
            ./artifacts/**/*.apk
            ./artifacts/**/*.zip
