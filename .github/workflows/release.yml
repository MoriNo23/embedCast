name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: '34'
          sdk-tools: '34'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: embedCast-tv
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: embedCast-tv
        run: ./gradlew assembleRelease --no-daemon

      - name: Create APK package
        run: |
          cp embedCast-tv/app/build/outputs/apk/release/*.apk "EmbedCast-${{ github.ref_name }}-android-tv.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-tv-apk
          path: EmbedCast-*-android-tv.apk

  build-android-remote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: '34'
          sdk-tools: '34'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('embedCast-remote/**/*.gradle*', 'embedCast-remote/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: embedCast-remote
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: embedCast-remote
        run: ./gradlew assembleRelease --no-daemon

      - name: Create APK package
        run: |
          cp embedCast-remote/app/build/outputs/apk/release/*.apk "EmbedCast-${{ github.ref_name }}-android-remote.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-remote-apk
          path: EmbedCast-*-android-remote.apk

  build-host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build CLI tool
        working-directory: embedCast-host/cli-tool
        run: |
          dotnet restore
          dotnet publish --configuration Release --output ./publish

      - name: Build Web GUI
        working-directory: embedCast-host/web-gui
        run: |
          dotnet restore
          dotnet publish --configuration Release --output ./publish

      - name: Create CLI package
        run: |
          cd embedCast-host/cli-tool/publish
          zip -r "../../../EmbedCast-${{ github.ref_name }}-cli-tool.zip" .
          cd ../../..

      - name: Create Web GUI package
        run: |
          cd embedCast-host/web-gui/publish
          zip -r "../../../EmbedCast-${{ github.ref_name }}-web-gui.zip" .
          cd ../../..

      - name: Upload host tools artifacts
        uses: actions/upload-artifact@v4
        with:
          name: embedCast-host-tools
          path: EmbedCast-*.zip

  create-release:
    needs: [build-android-tv, build-android-remote, build-host]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "=== Artifacts ==="
          find ./artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EmbedCast ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            <p align="center">
              <img src="https://raw.githubusercontent.com/MoriNo23/embedCast/main/assets/logo.png" alt="EmbedCast Logo" width="150">
            </p>

            # 🎬 EmbedCast ${{ github.ref_name }}

            **Video casting from Linux/Phone to Android TV with full remote control via WebSocket**

            ---

            ## 📦 Downloads

            ### Android TV
            | App | File | Description |
            |-----|------|-------------|
            | TV App | `EmbedCast-${{ github.ref_name }}-android-tv.apk` | Main app for Android TV |

            ### Mobile Remote
            | App | File | Description |
            |-----|------|-------------|
            | Remote | `EmbedCast-${{ github.ref_name }}-android-remote.apk` | Control from your phone |

            ### Linux Host Tools
            | App | File | Description |
            |-----|------|-------------|
            | CLI Tool | `EmbedCast-${{ github.ref_name }}-cli-tool.zip` | Command-line interface |
            | Web GUI | `EmbedCast-${{ github.ref_name }}-web-gui.zip` | Browser-based control |

            ---

            ## 🚀 Quick Start

            ### 1. Install on Android TV
            1. Download `EmbedCast-${{ github.ref_name }}-android-tv.apk`
            2. Transfer to your Android TV
            3. Install and launch (WebSocket server starts on port 8080)

            ### 2. Control from Phone
            1. Download `EmbedCast-${{ github.ref_name }}-android-remote.apk`
            2. Install on your Android phone
            3. Enter TV IP address and connect

            ### 3. Or use Linux Host Tools
            ```bash
            # CLI Tool
            unzip EmbedCast-${{ github.ref_name }}-cli-tool.zip
            cd cli-tool
            ./cli-tool load "https://example.com/video.mp4"

            # Web GUI
            unzip EmbedCast-${{ github.ref_name }}-web-gui.zip
            cd web-gui
            ./web-gui
            # Open http://localhost:3000 in browser
            ```

            ---

            ## ✨ Features

            - 🎥 Cast videos from Linux/Phone to Android TV
            - 🎮 Full playback control via WebSocket
            - 📱 Remote control from mobile app
            - 📺 Leanback-optimized TV interface
            - 🔄 Auto-reconnect on disconnect
            - 💾 Resume playback from saved positions
            - 📡 Real-time status synchronization

            ---

            ## 📡 WebSocket Protocol

            ```json
            {"action": "load", "url": "https://example.com/video.mp4"}
            {"action": "play"}
            {"action": "pause"}
            {"action": "seek", "seconds": 120}
            {"action": "stop"}
            ```

            ---

            ## 🔗 Links

            - [📖 Documentation](https://github.com/MoriNo23/embedCast#readme)
            - [🐛 Report Issues](https://github.com/MoriNo23/embedCast/issues)
            - [📡 WebSocket Protocol](https://github.com/MoriNo23/embedCast/blob/main/embedCast-tv/WEBSOCKET_PROTOCOL.md)
            - [📜 Changelog](https://github.com/MoriNo23/embedCast/blob/main/CHANGELOG.md)

            ---

            ⭐ **Star this repo if you find it useful!**
          files: |
            ./artifacts/**/*.apk
            ./artifacts/**/*.zip
